# Esther Trading Configuration — Tradier (All 12 Tickers)
# Full ticker coverage: ETFs + Commodities/Bonds + Mega-cap + Index

tickers:
  tier1:
    # SuperLuckeee PRIMARY: SPX/SPY/QQQ/IWM — 1DTE Iron Condors + all pillars
    # 1DTE: more credit, less gamma risk, avoids same-day PDT close
    symbols: ["SPY", "QQQ", "IWM", "SPX"]
    expiry: "1dte"
    pillars: [1, 2, 3, 4]

  tier2:
    # SuperLuckeee SECONDARY: Commodities + Bonds (weekly options)
    # GLD, SLV, USO, TLT — mentioned explicitly in strategy for P2/P3/P4
    symbols: ["GLD", "SLV", "USO", "TLT"]
    expiry: "weekly"
    pillars: [2, 3, 4]

  tier3:
    # SuperLuckeee TIER 3: High-IV mega-caps (weekly options)
    # NVDA, TSLA, AAPL, AMZN — explicitly named in strategy for P2/P3/P4
    symbols: ["NVDA", "TSLA", "AAPL", "AMZN"]
    expiry: "weekly"
    pillars: [2, 3, 4]

  tier4:
    # EXTENDED UNIVERSE: Additional high-IV names for more opportunities
    # Not in original SuperLuckeee list but high options volume, liquid
    symbols: ["META", "MSFT", "AMD", "NFLX", "COIN", "PLTR", "GOOGL"]
    expiry: "weekly"
    pillars: [2, 3, 4]

# Inherit everything else from defaults — only override what differs
# Bias, quality, pillars, risk, AI, sizing all use same defaults

# Risk Management — separate budget for index trades
risk:
  max_positions:
    tier1: 20
    tier2: 10
    tier3: 10
    tier4: 10
    tier5: 10
  daily_loss_cap_pct: 0.50      # 50% daily loss cap — small account, 1 contract max
  max_risk_per_ticker_pct: 0.95  # 95% — small live account, IC margin covers most of balance
  cooldown_consecutive_losses: 0
  cooldown_minutes: 0

# Inversion Engine — INVERT ON FIRST LOSS
inversion:
  consecutive_loss_trigger: 1
  state_file: "data/inversion_state_tradier.json"

# Engine Schedule
engine:
  scan_interval_seconds: 180    # 3 min scans — reduces Claude API calls
  market_open: "09:30"
  market_close: "16:00"
  pre_market_scan: "09:15"
  eod_cleanup: "15:50"
  first_trade_after: "10:00"    # SuperLuckeee: no trades in first 30min FOMO zone
  max_trades_per_day: 3         # PDT limit — max 3 day trades/5 days

# Quality — match Alpaca aggressive settings
quality:
  max_spread_pct: 0.25
  min_volume:
    tier1: 100
    tier2: 50
    tier3: 50
  iv_rank:
    spread_min: 20
    spread_max: 80
    iron_condor_min: 25

# Pillar ranges — wider for more trades
bias:
  pillar_ranges:
    p1_low: -35
    p1_high: 35
    p2_threshold: -25
    p3_threshold: 25
    p4_threshold: 25

# AI Debate
ai:
  model: "gemini-2.5-flash"
  max_tokens: 1024
  temperature: 0.7
  ai_backend: "gemini"
  ollama_model: "glm-4.7-flash:latest"
  ollama_base_url: "http://127.0.0.1:11434/v1"
#  groq_model: "llama-3.3-70b-versatile"
#  groq_fallback_models:
#    - "llama-3.1-8b-instant"
  gemini_model: "gemini-2.5-flash"
  gemini_fallback_models:
    - "gemini-3-flash-preview"

# Sizing — AGGRESSIVE for paper
sizing:
  kelly_fraction: 0.50
  min_contracts: 1
  max_contracts: 1
  win_streak_multiplier: 1.30
  loss_streak_divisor: 1.0

# Logging — separate log file
logging:
  level: "INFO"
  file: "logs/esther-tradier.log"
