# Esther Sandbox Config — FULL THROTTLE COMPOUNDING
# No PDT limits. No trade caps. Compound everything. Run hard.
# Uses Tradier SANDBOX API (free paper trading)

tickers:
  tier1:
    symbols: ["SPY", "QQQ", "IWM", "SPX"]
    expiry: "1dte"
    pillars: [1, 2, 3]

  tier2:
    symbols: ["GLD", "SLV", "USO", "TLT"]
    expiry: "weekly"
    pillars: [2, 3, 4]

  tier3:
    symbols: ["NVDA", "TSLA", "AAPL", "AMZN"]
    expiry: "weekly"
    pillars: [1, 2, 3]

  tier4:
    symbols: ["META", "MSFT", "AMD", "NFLX", "COIN", "PLTR", "GOOGL"]
    expiry: "weekly"
    pillars: [1, 2, 3]

risk:
  max_positions:
    tier1: 50
    tier2: 20
    tier3: 20
    tier4: 20
    tier5: 20
  max_positions_per_ticker: 5
  daily_loss_cap_pct: 0.02
  max_risk_per_ticker_pct: 0.75
  cooldown_consecutive_losses: 0
  cooldown_minutes: 0

inversion:
  consecutive_loss_trigger: 1
  state_file: "data/inversion_state_sandbox.json"

engine:
  scan_interval_seconds: 120
  market_open: "09:30"
  market_close: "16:00"
  pre_market_scan: "09:15"
  eod_cleanup: "15:50"
  first_trade_after: "10:00"
  max_trades_per_day: 50

quality:
  max_spread_pct: 0.25
  min_volume:
    tier1: 50
    tier2: 25
    tier3: 25
  iv_rank:
    spread_min: 15
    spread_max: 85
    iron_condor_min: 20

bias:
  pillar_ranges:
    p1_low: -30
    p1_high: 30
    p2_threshold: -25
    p3_threshold: 25
    p4_threshold: 30

ai:
  model: "gemini-2.5-flash"
  max_tokens: 1024
  temperature: 0.7
  ai_backend: "gemini"
  gemini_model: "gemini-2.5-flash"
  gemini_fallback_models:
    - "gemini-3-flash-preview"

sizing:
  kelly_fraction: 0.75
  min_contracts: 10
  max_contracts: 100
  win_streak_multiplier: 1.30
  loss_streak_divisor: 1.0

# Disable stops on sandbox — fills are unrealistic, let everything expire
positions:
  eod_close_minutes_before: 0
  disable_stops: true
  expire_all_at_eod: true

logging:
  level: "INFO"
  file: "logs/esther-sandbox.log"
